components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: integer
      description: Product identifier.
    Filename:
      name: filename
      in: path
      required: true
      schema:
        type: string
      description: Static image filename.
    ItemId:
      name: item_id
      in: path
      required: true
      schema:
        type: integer
      description: Raw material identifier.
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
      description: Order identifier.
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
      description: User identifier.
    EmployeeId:
      name: employee_id
      in: path
      required: true
      schema:
        type: integer
      description: Employee identifier.
    Month:
      name: month
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 12
      description: Calendar month.
    Year:
      name: year
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Calendar year.
    AsOfDate:
      name: as_of_date
      in: query
      required: false
      schema:
        type: string
        format: date
      description: Optional cutoff date for payroll calculations.
  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthErrorResponse'
          example:
            msg: Missing Authorization Header
    Forbidden:
      description: Authenticated user does not have the required role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: Access forbidden
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
              - $ref: '#/components/schemas/MessageResponse'
    UserNotFound:
      description: User not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: User not found
    ProductNotFound:
      description: Product not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Product not found
    RawMaterialNotFound:
      description: Raw material not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Raw material not found
    OrderNotFound:
      description: Order not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Order not found
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AuthErrorResponse:
      type: object
      properties:
        msg:
          type: string
      required:
        - msg
    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum:
            - customer
          default: customer
        phone:
          type: string
        address:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthLoginResponse:
      type: object
      required:
        - token
        - name
        - role
        - email
      properties:
        token:
          type: string
          description: JWT bearer token.
        name:
          type: string
        role:
          type: string
          enum:
            - admin
            - customer
            - employee
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        department:
          type: string
        job_title:
          type: string
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
      required:
        - id
        - name
        - email
        - role
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: number
          format: float
        wage_per_kulhad:
          type: number
          format: float
        stock:
          type: integer
        image:
          type: string
      required:
        - id
        - name
        - category
        - price
        - wage_per_kulhad
        - stock
        - image
      example:
        id: 1
        name: Classic Kulhad
        category: Kulhad
        price: 20.0
        wage_per_kulhad: 25.0
        stock: 120
        image: classic.png
    ProductCreateRequest:
      type: object
      required:
        - name
