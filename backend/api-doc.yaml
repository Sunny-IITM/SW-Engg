  /api/production/detect:
    post:
      tags:
        - production
      summary: Detect kulhads from an uploaded image
      description: |
        Uploads an image to the backend, which stores it temporarily and invokes an external object-detection service.

        The current Flask route validates image uploads and returns normalized detection results.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Detection completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResponse'
              example:
                success: true
                kulhad_count: 2
                detections:
                  - class: kulhad
                    confidence: 0.87
                    x: 212
                    y: 180
                    width: 110
                    height: 140
                  - class: kulhad
                    confidence: 0.76
                    x: 140
                    y: 120
                    width: 90
                    height: 100
        '400':
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionErrorResponse'
              examples:
                missingFile:
                  value:
                    success: false
                    error: missing_file
                    message: Image file is required
                emptyFile:
                  value:
                    success: false
                    error: empty_file
                    message: Uploaded image is empty
                invalidType:
                  value:
                    success: false
                    error: invalid_file_type
                    message: "Unsupported image format. Allowed formats: .bmp, .jpeg, .jpg, .png, .webp"
        '500':
          description: Detection or configuration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionErrorResponse'
              examples:
                inference:
                  value:
                    success: false
                    error: inference_failed
                configuration:
                  value:
                    success: false
                    error: configuration_error
                    message: ROBOFLOW_API_KEY is not configured
  /detect-kulhad:
    post:
      tags:
        - production
      summary: Detect kulhads from an uploaded image
      description: Alias of `/api/production/detect`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Detection completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResponse'
        '400':
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionErrorResponse'
        '500':
          description: Detection or configuration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionErrorResponse'

