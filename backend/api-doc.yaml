openapi: 3.0.0
info:
  title: Kulhad Flask Backend API
  version: 1.0.0
  description: |
    OpenAPI 3.0 specification generated from the current Flask backend blueprints.

    Authentication-protected endpoints use JWT bearer authentication.
    The computer vision endpoints upload an image to the backend, which then calls an external object-detection service internally.
servers:
  - url: http://localhost:5000
    description: Local development server
tags:
  - name: auth
    description: Registration and login operations.
  - name: products
    description: Catalog and product image management.
  - name: cart
    description: Cart schema placeholder. No cart endpoints are currently implemented.
  - name: orders
    description: Checkout profile, order placement, and order management.
  - name: production
    description: Production attendance logging and image-based kulhad detection.
  - name: inventory
    description: Finished goods inventory and raw material inventory.
  - name: analytics
    description: Admin dashboard analytics and daily reporting.
  - name: admin
    description: Admin-managed user operations.
  - name: profile
    description: Self-service user profile operations.
  - name: payroll
    description: Payroll calculation and status management.
paths:
  /api/auth/register:
    post:
      tags:
        - auth
      summary: Register a customer account
      description: Creates a new customer user and linked customer profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: Jane Smith
              email: jane@example.com
              password: securePass123
              role: customer
              phone: "9876543210"
              address: Chennai
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: User registered successfully
        '400':
          description: Validation or uniqueness error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                missingFields:
                  value:
                    message: Name, email, and password are required
                invalidRole:
                  value:
                    message: Registration is only available for customer accounts
                duplicateEmail:
                  value:
                    message: Email already exists
  /api/auth/login:
    post:
      tags:
        - auth
      summary: Log in a user
      description: Validates credentials and returns a JWT plus role-specific profile fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: customer@example.com
              password: customerpass
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
              example:
                token: <jwt-token>
                name: Customer User
                role: customer
                email: customer@example.com
                phone: "9999999999"
                address: Main Street
                city: Jaipur
                state: Rajasthan
                postal_code: "302001"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Invalid credentials
        '403':
          description: Disabled account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: This account has been disabled
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: User not found

  /api/products/:
    get:
      tags:
        - products
      summary: List products
      description: Returns the full product catalog. This endpoint is public.
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
              example:
                - id: 1
                  name: Classic Kulhad
                  category: Kulhad
                  price: 20.0
                  wage_per_kulhad: 25.0
                  stock: 120
                  image: classic.png
    post:
      tags:
        - products
      summary: Create a product
      description: Creates a new catalog product. Admin access is required.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
            example:
              name: Premium Serving Kulhad
              category: Kulhad
              price: 65
              wage_per_kulhad: 40
              stock: 18
              image: premium-serving-kulhad.webp
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Product created
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/products/images/{filename}:
    get:
      tags:
        - products
      summary: Fetch a product image
      description: Serves a static product image file by filename.
      parameters:
        - $ref: '#/components/parameters/Filename'
      responses:
        '200':
          description: Image file response
          content:
            image/png: {}
            image/jpeg: {}
            image/webp: {}
        '404':
          description: Image not found
  /api/products/upload-image:
    post:
      tags:
        - products
      summary: Upload a product image
      description: Uploads a product image into backend static storage. Admin access is required.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
            encoding:
              image:
                contentType: image/png, image/jpeg, image/webp
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductImageUploadResponse'
              example:
                filename: upload.jpg
        '400':
          description: Missing or unsupported image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing:
                  value:
                    error: Image file is required
                invalid:
                  value:
                    error: Only PNG, JPG, JPEG, and WEBP images are supported
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/products/history:
    get:
      tags:
        - products
      summary: List product history
      description: Returns the latest 100 product history entries. Admin access is required.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Product history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductHistoryEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/products/{product_id}:
    put:
      tags:
        - products
      summary: Update a product
      description: Updates one or more product fields. Admin access is required.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
            example:
              price: 19.0
              stock: 99
              image: updated.jpg
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Product updated
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ProductNotFound'
    delete:
      tags:
        - products
      summary: Delete a product
      description: Deletes a product. Admin access is required.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Product deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ProductNotFound'

  /api/inventory/:
    get:
      tags:
        - inventory
      summary: List finished goods inventory
      description: Returns admin-facing inventory rows for products and their minimum stock thresholds.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryProduct'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/inventory/history:
    get:
      tags:
        - inventory
      summary: List finished goods inventory history
      description: Returns up to 100 inventory adjustment history records.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Inventory history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryHistoryEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/inventory/adjust:
    post:
      tags:
        - inventory
      summary: Adjust finished goods inventory
      description: Adds or removes product stock and optionally updates minimum stock.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryAdjustRequest'
            example:
              product_id: 1
              type: add
              quantity: 25
              reason: Weekly production batch
              min_stock: 10
      responses:
        '200':
          description: Inventory updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryAdjustResponse'
              example:
                message: Inventory updated
                product:
                  id: 1
                  name: Classic Kulhad
                  category: Kulhad
                  stock: 75
                  min_stock: 10
                  price: 20.0
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ProductNotFound'
  /api/inventory/raw:
    get:
      tags:
        - inventory
      summary: List raw material inventory
      description: Returns all raw material inventory items.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Raw material inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RawMaterial'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - inventory
      summary: Create a raw material
      description: Creates a raw material inventory record and history entry.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawMaterialRequest'
            example:
              name: Clay Mix
              category: Clay
              unit: kg
              supplier: Soil Suppliers
              quantity: 100
              reorder_level: 25
              cost_per_unit: 4.5
      responses:
        '201':
          description: Raw material created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawMaterial'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/inventory/raw/history:
    get:
      tags:
        - inventory
      summary: List raw material inventory history
      description: Returns up to 100 raw material inventory history records.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Raw material history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RawMaterialHistoryEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/inventory/raw/{item_id}:
    put:
      tags:
        - inventory
      summary: Update a raw material
      description: Updates raw material metadata such as name, supplier, and unit.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawMaterialRequest'
      responses:
        '200':
          description: Raw material updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawMaterial'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/RawMaterialNotFound'
    delete:
      tags:
        - inventory
      summary: Delete a raw material
      description: Deletes a raw material inventory row.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
      responses:
        '200':
          description: Raw material deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteRawMaterialResponse'
              example:
                message: Raw material deleted
                id: 12
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/RawMaterialNotFound'
  /api/inventory/raw/{item_id}/adjust:
    put:
      tags:
        - inventory
      summary: Adjust raw material stock
      description: Increases or decreases raw material quantity.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawMaterialStockAdjustRequest'
            example:
              adjustment: 10
              reason: Restocked from supplier
      responses:
        '200':
          description: Raw material stock adjusted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawMaterialStockAdjustResponse'
              example:
                message: Restocked from supplier
                material:
                  id: 3
                  name: Clay Mix
                  category: Clay
                  quantity: 110
                  unit: kg
                  reorder_level: 25
                  cost_per_unit: 4.5
                  supplier: Soil Suppliers
                  last_restocked: '2026-04-20'
                  inventory_value: 495
                  is_low_stock: false
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/RawMaterialNotFound'

  /api/analytics/dashboard:
    get:
      tags:
        - analytics
      summary: Get dashboard summary
      description: Returns admin dashboard counts, low stock alerts, and recent orders.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsDashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/analytics/summary:
    get:
      tags:
        - analytics
      summary: Get analytics summary
      description: Returns a full analytics snapshot with sales, inventory, payments, and overview sections.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Analytics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/analytics/daily-report/send:
    post:
      tags:
        - analytics
      summary: Send daily analytics report
      description: Sends the daily report to a configured external chat webhook.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Daily report sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyReportSendResponse'
              example:
                message: Daily report sent successfully
                preview: Daily Overall Report - 2026-04-20
                response: ok
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          description: External delivery failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unable to reach external reporting webhook

  /api/admin/users:
    get:
      tags:
        - admin
      summary: List managed users
      description: Returns customer, employee, and admin users. Supports optional role filtering.
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          required: false
          description: Optional role filter.
          schema:
            type: string
            enum:
              - customer
              - employee
              - admin
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - admin
      summary: Create a managed user
      description: Creates a customer or employee account. Admin access is required.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
            example:
              name: Worker Two
              email: worker.two@example.com
              password: workerpass
              role: employee
              phone: "1234567890"
              address: Factory Road
              department: Production
              job_title: Painter
              daily_wage: 18000
              is_active: true
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/users/{user_id}:
    put:
      tags:
        - admin
      summary: Update a managed user
      description: Updates an existing customer or employee account. Admin access is required.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
            example:
              name: Customer User Updated
              phone: "1111111111"
              address: Updated Street
              is_active: true
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UserNotFound'
    delete:
      tags:
        - admin
      summary: Delete a managed user
      description: Deletes a user account. The current admin account cannot delete itself.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: User deleted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UserNotFound'

  /api/profile/me:
    get:
      tags:
        - profile
      summary: Get current user profile
      description: Returns the authenticated user's profile, with customer- or employee-specific fields.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/UserNotFound'
    put:
      tags:
        - profile
      summary: Update current user profile
      description: Updates the authenticated user's profile and optionally changes the password.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
            example:
              name: Customer Prime
              phone: "2222222222"
              address: Prime Street
              city: Jodhpur
              state: Rajasthan
              postal_code: "342001"
              current_password: customerpass
              new_password: newcustomerpass
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/UserNotFound'

  /api/orders/checkout-profile:
    get:
      tags:
        - orders
      summary: Get checkout profile
      description: Returns the authenticated customer's checkout address profile.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Checkout profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutProfile'
              example:
                name: Customer User
                email: customer@example.com
                phone: "9999999999"
                address: Main Street
                city: Jaipur
                state: Rajasthan
                postal_code: "302001"
                has_saved_address: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Non-customer account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Checkout profile is only available for customers
        '404':
          $ref: '#/components/responses/UserNotFound'
    put:
      tags:
        - orders
      summary: Update checkout profile
      description: Updates the authenticated customer's saved checkout address.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutProfileUpdateRequest'
            example:
              phone: "9999999999"
              address: Main Street
              city: Jaipur
              state: Rajasthan
              postal_code: "302001"
      responses:
        '200':
          description: Checkout profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Non-customer account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Checkout profile is only available for customers
        '404':
          $ref: '#/components/responses/UserNotFound'
  /api/orders/:
    post:
      tags:
        - orders
      summary: Place an order
      description: Creates a customer order, decrements stock, calculates shipping, and creates a payment record.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            example:
              phone: "9999999999"
              address: Main Street
              city: Jaipur
              state: Rajasthan
              postal_code: "302001"
              payment_method: UPI
              items:
                - id: 1
                  qty: 2
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
              example:
                message: Order placed successfully
                id: 12
                order_number: ORD-0012
                status: Pending
                payment: Paid
                method: UPI
                amount: 92.0
                items:
                  - name: Classic Kulhad
                    quantity: 2
                    subtotal: 42.0
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Unauthorized'
